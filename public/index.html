<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luma Comercializadora — Tu central de abasto confiable</title>
    <meta
      name="description"
      content="Del campo mexicano directo a tu negocio. Comercializadora de frutas, verduras y abarrotes para CDMX, Metepec y Pachuca."
    />

    <link rel="icon" href="assets/LOGOLUMA.jpeg" type="image/jpeg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Navegación -->
    <header class="nav" data-nav>
      <a href="#" class="nav__logo" aria-label="Luma Comercializadora">Luma</a>
      <nav class="nav__links" aria-label="Principal">
        <a href="#catalogo">Catálogo</a>
        <a href="#nosotros">Nosotros</a>
        <a href="#cobertura">Cobertura</a>
        <a href="#contacto">Contacto</a>
      </nav>
      <a href="#contacto" class="btn btn--primary nav__cta">Cotizar</a>
    </header>

    <!-- Hero -->
    <section class="hero" data-hero>
      <div class="hero__media" data-hero-media>
        <video
          class="hero__video"
          src="assets/LUMA1.mp4"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>
        <div class="hero__overlay" aria-hidden="true"></div>

        <div class="hero__content">
          <h1 class="hero__title">Tu central de abasto confiable</h1>
          <p class="hero__subtitle">
            Del campo mexicano directo a tu negocio
            <span class="hero__dot">·</span> CDMX
            <span class="hero__dot">·</span> Metepec
            <span class="hero__dot">·</span> Pachuca
          </p>
          <div class="hero__ctas">
            <a href="#contacto" class="btn btn--primary btn--lg">Cotizar para mi negocio</a>
            <a href="#catalogo" class="btn btn--ghost btn--lg">Ver catálogo</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Librerías por CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
